name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─── Stage 1: Quality Gates ───
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Switch to MySQL schema
        run: cp prisma/schema.mysql.prisma prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint (src only)
        run: npx eslint src/

      - name: TypeScript Check
        run: npx tsc --noEmit

  # ─── Stage 2: Build ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Switch to MySQL schema
        run: cp prisma/schema.mysql.prisma prisma/schema.prisma

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        env:
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
          NODE_ENV: production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/standalone/
            .next/static/
            public/
            prisma/
            package.json
          retention-days: 1

  # ─── Stage 3: Deploy (only on push to main) ───
  deploy:
    name: Deploy to Jino
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: build-artifact/

      - name: Create deployment package
        run: |
          # Next.js standalone deployment structure:
          # APP_DIR/.next/standalone/ <- the server and its node_modules
          # APP_DIR/.next/standalone/.next/static/ <- static assets (MUST be here)
          # APP_DIR/.next/standalone/public/ <- public files
          # APP_DIR/.next/standalone/.next/server/ <- server chunks
          # APP_DIR/prisma/ <- Prisma schema

          mkdir -p deploy-package/.next/standalone
          mkdir -p deploy-package/prisma

          # Copy the full standalone directory (includes server.js, node_modules, .next/)
          cp -r build-artifact/.next/standalone/. deploy-package/.next/standalone/

          # Copy static assets into standalone/.next/static/ (Next.js requires this)
          mkdir -p deploy-package/.next/standalone/.next/static
          cp -r build-artifact/.next/static/. deploy-package/.next/standalone/.next/static/

          # Copy public files into standalone/public/ (Next.js requires this for serving)
          mkdir -p deploy-package/.next/standalone/public
          cp -r build-artifact/public/. deploy-package/.next/standalone/public/ 2>/dev/null || true

          # Copy Prisma schema
          cp -r build-artifact/prisma/. deploy-package/prisma/

          # Copy package.json for reference
          cp build-artifact/package.json deploy-package/

          # Verify structure
          echo "Deploy package structure:"
          ls -la deploy-package/
          ls -la deploy-package/.next/standalone/
          ls -la deploy-package/.next/standalone/.next/
          echo "Static files count: $(find deploy-package/.next/standalone/.next/static/ -type f | wc -l)"

          # Create tarball
          cd deploy-package && tar -czf ../deploy.tar.gz . && cd ..
          echo "Package size: $(du -sh deploy.tar.gz)"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JINO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.JINO_SSH_PORT }} ${{ secrets.JINO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload deployment package via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.JINO_HOST }}
          username: ${{ secrets.JINO_USERNAME }}
          key: ${{ secrets.JINO_SSH_KEY }}
          port: ${{ secrets.JINO_SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Upload deploy script via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.JINO_HOST }}
          username: ${{ secrets.JINO_USERNAME }}
          key: ${{ secrets.JINO_SSH_KEY }}
          port: ${{ secrets.JINO_SSH_PORT }}
          source: "scripts/deploy-production.sh"
          target: "/tmp/deploy-script/"

      - name: Execute deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.JINO_HOST }}
          username: ${{ secrets.JINO_USERNAME }}
          key: ${{ secrets.JINO_SSH_KEY }}
          port: ${{ secrets.JINO_SSH_PORT }}
          script_stop: true
          command_timeout: 600s
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.JINO_APP_DIR }}"
            chmod +x /tmp/deploy-script/scripts/deploy-production.sh
            bash /tmp/deploy-script/scripts/deploy-production.sh

  # ─── Stage 4: Post-Deploy Verification ───
  verify:
    name: Verify Production
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for app startup
        run: sleep 60

      - name: Check API health endpoint
        run: |
          MAX_RETRIES=30
          RETRY_INTERVAL=10
          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s --connect-timeout 15 --max-time 20 https://30-0.xn--p1ai/api/health 2>/dev/null || echo "")
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"ok"' || echo "")
            if [ -n "$STATUS" ]; then
              echo "Health check PASSED after $((i * RETRY_INTERVAL))s: $RESPONSE"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES - waiting ${RETRY_INTERVAL}s... Response: $RESPONSE"
            sleep $RETRY_INTERVAL
          done
          echo "::error::API health check failed after $((MAX_RETRIES * RETRY_INTERVAL))s"
          exit 1

      - name: Check homepage HTTP status
        run: |
          HTTP_CODE=$(curl -s --connect-timeout 15 --max-time 20 -o /dev/null -w "%{http_code}" https://30-0.xn--p1ai/ 2>/dev/null || echo "000")
          echo "Homepage HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Homepage returned HTTP $HTTP_CODE (expected 200)"
            exit 1
          fi
          echo "Homepage is up"

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
