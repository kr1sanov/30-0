# ──────────────────────────────────────────────
# 30-0 RPL — Docker Compose for Production
# ──────────────────────────────────────────────
# Uses external MySQL database (Jino hosting)
#
# Usage:
#   docker compose up -d           # Start all services
#   docker compose logs -f app     # View app logs
#   docker compose down            # Stop all services

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 30-0-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Database Migration & Seed (run once) ───
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 30-0-migrate
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    command: >
      sh -c "
        npx prisma db push &&
        echo 'Schema push complete. Now seeding...' &&
        npx tsx prisma/seed.ts &&
        echo 'Seed complete!'
      "
    profiles:
      - migrate
